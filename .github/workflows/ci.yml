name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbadmin
          POSTGRES_PASSWORD: dbadmin123
          POSTGRES_DB: appdb
        options: >-
          --health-cmd "pg_isready -U dbadmin -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: dbadmin
          MONGO_INITDB_ROOT_PASSWORD: dbadmin123
          MONGO_INITDB_DATABASE: appdb
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: mcp-server
        run: poetry install

      - name: Lint
        working-directory: mcp-server
        run: poetry run ruff check .

      - name: Run tests
        working-directory: mcp-server
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: dbadmin
          POSTGRES_PASSWORD: dbadmin123
          POSTGRES_DB: appdb
          MONGO_HOST: localhost
          MONGO_PORT: 27017
          MONGO_USER: dbadmin
          MONGO_PASSWORD: dbadmin123
          MONGO_DB: appdb
        run: poetry run pytest tests/ -v
